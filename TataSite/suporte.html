<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte | Yoga Galáctico</title>
    
    <!-- Fonte do corpo de texto -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ==========================================================================
           FONTES EXCLUSIVAS (Belgant Aesthetic)
           ========================================================================== */
        @font-face {
            font-family: 'Belgant Aesthetic';
            /* Aponta exatamente para o seu arquivo .ttf na mesma pasta */
            src: url('Belgant Aesthetic.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* ==========================================================================
           VARIÁVEIS (Mantendo a paleta original e a fonte principal)
           ========================================================================== */
        :root {
            --cor-escura: #1A1208;
            --cor-escura-2: #2A1F14;
            --cor-acento: #C8A96E;
            --cor-acento-soft: #D9C398;
            --cor-primaria: #3E2B1D;
            --cor-fundo-claro: #FAF7F2;
            --cor-texto-suave: #665D55;
            
            /* APLICANDO A FONTE BELGANT NOS DESTAQUES E TÍTULOS */
            --font-display: 'Belgant Aesthetic', serif; 
            --font-body: 'Inter', sans-serif;
            --font-italic: 'Belgant Aesthetic', serif;
        }

        /* ==========================================================================
           RESETS E ESTILOS GERAIS
           ========================================================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background-color: var(--cor-escura);
            color: #FFF;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }
        a { text-decoration: none; }

        /* ==========================================================================
           ANIMAÇÕES
           ========================================================================== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-fade-up {
            animation: fadeUp 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0;
        }

        /* ==========================================================================
           COMPONENTES VISUAIS DA MARCA
           ========================================================================== */
        .tag-label {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 8px; font-family: var(--font-body); font-weight: 700;
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
            color: var(--cor-acento); margin-bottom: 24px;
        }
        .btn-cta-gold {
            display: inline-block; font-family: var(--font-body); font-weight: 700;
            font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
            background: var(--cor-acento); color: var(--cor-escura);
            padding: 18px 32px; border-radius: 50px; transition: all 0.3s;
            text-align: center; border: none; cursor: pointer; width: 100%;
        }
        .btn-cta-gold:hover {
            background: #FFF; transform: scale(1.02);
        }
        .btn-voltar {
            display: inline-flex; align-items: center; gap: 8px;
            color: rgba(255,255,255,0.6); font-size: 14px; margin-top: 40px;
            transition: color 0.3s;
        }
        .btn-voltar:hover { color: var(--cor-acento); }

        /* ==========================================================================
           LAYOUT DA PÁGINA DE SUPORTE
           ========================================================================== */
        .support-section {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 80px 0;
            background: linear-gradient(180deg, var(--cor-escura) 0%, var(--cor-escura-2) 100%);
        }
        .support-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 64px;
            align-items: center;
        }

        /* IMAGEM */
        .support-image-wrapper {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(200,169,110,0.2);
        }
        .support-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 4/5;
        }

        /* FORMULÁRIO */
        .support-form-wrapper {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(200,169,110,0.25);
            border-radius: 24px;
            padding: 48px;
            backdrop-filter: blur(10px);
        }
        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }
        .form-group label {
            display: block;
            color: var(--cor-acento);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(200,169,110,0.3);
            color: #FFF;
            padding: 16px;
            border-radius: 12px;
            font-family: var(--font-body);
            font-size: 16px;
            transition: border-color 0.3s, background 0.3s;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--cor-acento);
            background: rgba(0,0,0,0.4);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        /* E-MAIL DESTAQUE */
        .email-destaque {
            font-family: var(--font-display);
            font-size: clamp(20px, 3vw, 28px);
            color: var(--cor-acento);
            margin: 24px 0 32px;
            display: inline-block;
            border-bottom: 1px dashed rgba(200,169,110,0.5);
            padding-bottom: 4px;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 992px) {
            .support-grid { grid-template-columns: 1fr; gap: 40px; }
            .support-form-wrapper { padding: 32px 24px; }
            .support-image-wrapper img { aspect-ratio: 16/9; }
        }
    </style>
</head>
<body>

    <section class="support-section">
        <div class="container">
            <div class="support-grid">
                
                <!-- LADO ESQUERDO: IMAGEM DA TATÁ -->
                <div class="support-image-wrapper anim-fade-up">
                    <img src="tata-hero.png" alt="Tatá Vidal - Suporte Yoga Galáctico">
                </div>

                <!-- LADO DIREITO: TEXTOS E FORMULÁRIO -->
                <div class="support-content">
                    <span class="tag-label anim-fade-up" style="animation-delay: 0.2s;">
                        <svg width="14" height="14" viewBox="0 0 32 32"><path d="M16 0 L19.5 12.5 L32 16 L19.5 19.5 L16 32 L12.5 19.5 L0 16 L12.5 12.5 Z" fill="#C8A96E"/></svg>
                        ATENDIMENTO AO ALUNO
                        <svg width="14" height="14" viewBox="0 0 32 32"><path d="M16 0 L19.5 12.5 L32 16 L19.5 19.5 L16 32 L12.5 19.5 L0 16 L12.5 12.5 Z" fill="#C8A96E"/></svg>
                    </span>
                    
                    <h1 class="anim-fade-up" style="font-family: var(--font-display); font-size: clamp(32px, 5vw, 48px); line-height: 1.1; margin-bottom: 16px; animation-delay: 0.3s; font-weight: normal;">
                        Como podemos te ajudar?
                    </h1>
                    
                    <p class="anim-fade-up" style="color: rgba(255,255,255,0.8); font-size: 16px; margin-bottom: 8px; animation-delay: 0.4s;">
                        Se você tiver dúvidas sobre a plataforma, pagamentos ou dificuldades técnicas, nossa equipe está pronta para te auxiliar. Envie uma mensagem no formulário abaixo ou diretamente para:
                    </p>
                    
                    <div class="anim-fade-up" style="animation-delay: 0.5s;">
                        <a href="mailto:suporte@yogagalactico.com.br" class="email-destaque">suporte@yogagalactico.com.br</a>
                    </div>

                    <!-- FORMULÁRIO -->
                    <div class="support-form-wrapper anim-fade-up" style="animation-delay: 0.6s;">
                        <form action="mailto:suporte@yogagalactico.com.br" method="POST" enctype="text/plain">
                            
                            <div class="form-group">
                                <label for="nome">Seu Nome</label>
                                <input type="text" id="nome" name="Nome" class="form-control" placeholder="Como gosta de ser chamada?" required>
                            </div>
                            
                            <div class="form-group">
                                <label for="mensagem">Como podemos ajudar?</label>
                                <textarea id="mensagem" name="Mensagem" class="form-control" placeholder="Descreva sua dúvida ou solicitação com detalhes..." required></textarea>
                            </div>
                            
                            <button type="submit" class="btn-cta-gold">Enviar Mensagem por E-mail</button>
                        </form>
                    </div>

                    <!-- BOTÃO VOLTAR -->
                    <div class="anim-fade-up" style="animation-delay: 0.7s;">
                        <a href="index.html" class="btn-voltar">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                            Voltar para a página principal
                        </a>
                    </div>

                </div>
            </div>
        </div>
    </section>

</body>
</html>
